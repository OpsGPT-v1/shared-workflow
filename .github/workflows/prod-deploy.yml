name: Prod Deploy Template

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Name of the service (e.g. frontend-service)'
        required: true
        type: string
      image_name:
        description: 'Target ACR image repository (e.g. opsgpt/frontend-service)'
        required: true
        type: string
      release_tag:
        description: 'Release version tag (defaults to github.ref_name)'
        required: false
        type: string
      gitops_repo:
        description: 'Target GitOps repository (e.g. owner/opsgpt-gitops)'
        required: true
        type: string
      gitops_branch:
        description: 'Target GitOps repository branch'
        required: false
        default: 'main'
        type: string
      values_file_path:
        description: 'Path to values-prod.yaml in GitOps repo'
        required: false
        default: 'helm/opsgpt/values-prod.yaml'
        type: string
      # ADDED: Input for dev values file path to read from
      values_dev_file_path:
        description: 'Path to values-dev.yaml in GitOps repo'
        required: false
        default: 'helm/opsgpt/values-dev.yaml'
        type: string
      yaml_image_tag_path:
        description: 'yq path to update the image tag (e.g. .services.frontend-service.image.tag)'
        required: true
        type: string
      acr_login_server:
        description: 'ACR Login Server (e.g. opsgpt.azurecr.io)'
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Managed Identity Client ID for OIDC authentication'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
      GITOPS_PAT:
        description: 'GitHub Personal Access Token for GitOps repo push'
        required: true

jobs:
  promote:
    name: Promotes Dev image to Prod (Retag & Push)
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Azure OIDC Login
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # CRITICAL CHANGE: Checkout GitOps repo early to read the Dev state
      - name: Checkout GitOps Repo (Read Phase)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops_repo }}
          token: ${{ secrets.GITOPS_PAT }}
          ref: ${{ inputs.gitops_branch }}
          path: gitops-repo

      - name: Determine Tags and Target Commit SHA
        id: vars
        run: |
          # 1. Resolve production release tag string
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved production release tag: $TAG"

          # 2. Extract the exact running Dev tag from values-dev.yaml using yq and the input path
          # Uses the exact path (e.g., .services.ai-analysis-service.image.tag)
          DEV_TAG=$(yq eval '${{ inputs.yaml_image_tag_path }}' gitops-repo/${{ inputs.values_dev_file_path }})
          
          if [ -z "$DEV_TAG" ] || [ "$DEV_TAG" == "null" ]; then
            echo "::error::Failed to resolve Dev image tag from path: ${{ inputs.yaml_image_tag_path }} in ${{ inputs.values_dev_file_path }}"
            exit 1
          fi
          
          echo "commit_sha=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "Resolved running Dev image tag for pull: $DEV_TAG"

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          REGISTRY_NAME=$(echo "${{ inputs.acr_login_server }}" | cut -d'.' -f1)
          ACR_TOKEN=$(az acr login --name $REGISTRY_NAME --expose-token --output tsv --query accessToken)
          echo "::add-mask::$ACR_TOKEN"
          echo $ACR_TOKEN | docker login ${{ inputs.acr_login_server }} --username 00000000-0000-0000-0000-000000000000 --password-stdin

      # Dynamically pulls using the extracted Dev manifest tag (e.g., 6fc414de1577a07e5f4d4b2e2f8f68aa7fd6ee8e)
      - name: Pull existing Dev Image (built from commit SHA)
        run: |
          docker pull ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ steps.vars.outputs.commit_sha }}

      - name: Retag Image with Release Version
        run: |
          docker tag ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ steps.vars.outputs.commit_sha }} \
                     ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ steps.vars.outputs.tag }}

      - name: Push Promoted Release Image to ACR
        run: |
          docker push ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ steps.vars.outputs.tag }}

      # Update files inside the folder we checked out at step 2
      - name: Update values-prod.yaml with yq
        run: |
          cd gitops-repo
          yq -i '${{ inputs.yaml_image_tag_path }} = "${{ steps.vars.outputs.tag }}"' ${{ inputs.values_file_path }}

      - name: Commit and Push to GitOps Repo
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.values_file_path }}
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(gitops): promote ${{ inputs.service_name }} image tag to ${{ steps.vars.outputs.tag }}"
            git push origin ${{ inputs.gitops_branch }}
          fi
